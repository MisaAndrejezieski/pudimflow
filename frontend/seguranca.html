<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>PudimFlow - Segurança</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <h1>🍮 PudimFlow - Segurança</h1>
        <div class="turno">Turno da Noite - Misa</div>
    </div>

    <nav class="nav">
        <a href="index.html">📊 Dashboard</a>
        <a href="producao.html">🏭 Produção</a>
        <a href="qualidade.html">✅ Qualidade</a>
        <a href="seguranca.html" class="active">🛡️ Segurança</a>
        <a href="sim.html">💡 SIM</a>
        <a href="relatorios.html">📈 Relatórios</a>
    </nav>

    <div class="container">
        <!-- DSS - Diálogo de Segurança -->
        <div class="card">
            <h2>🗣️ DSS - Diálogo de Segurança</h2>
            
            <div class="checklist-item">
                <input type="checkbox" id="dssRealizado">
                <label><strong>DSS realizado hoje</strong></label>
            </div>
            
            <div class="form-group" style="margin-top: 1rem;">
                <label>Tema do DSS</label>
                <input type="text" id="dssTema" placeholder="Ex: Uso de EPI na área quente">
            </div>
            
            <div class="form-group">
                <label>Participantes (nomes)</label>
                <textarea id="dssParticipantes" rows="3" placeholder="João Silva&#10;Maria Santos&#10;Carlos Oliveira&#10;Ana Paula&#10;Roberto Lima"></textarea>
            </div>
            
            <div class="form-group">
                <label>Principais pontos discutidos</label>
                <textarea id="dssPontos" rows="3" placeholder="Registrar os principais pontos do diálogo..."></textarea>
            </div>
        </div>

        <!-- Quase Acidente -->
        <div class="card">
            <h2>⚠️ Quase Acidente</h2>
            
            <div class="form-group">
                <label>Registrar quase acidente (se houver)</label>
                <textarea id="quaseAcidente" rows="4" placeholder="Descreva o que aconteceu, local, horário, potencial de risco..."></textarea>
            </div>
            
            <div class="form-group">
                <label>Ação preventiva tomada</label>
                <textarea id="acaoPreventiva" rows="3" placeholder="O que foi feito para evitar que aconteça novamente?"></textarea>
            </div>
        </div>

        <!-- Ações de Segurança -->
        <div class="card">
            <h2>📋 Ações de Segurança</h2>
            
            <div class="form-group">
                <label>Inspeções realizadas</label>
                <textarea id="inspecoes" rows="3" placeholder="Extintores, iluminação, sinalização, EPI's..."></textarea>
            </div>
            
            <div class="form-group">
                <label>Recomendações da equipe</label>
                <textarea id="recomendacoes" rows="3" placeholder="Sugestões dos colaboradores para melhorar a segurança..."></textarea>
            </div>
        </div>

        <div class="card">
            <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                <button id="btnSalvar" style="background: var(--success);">💾 SALVAR SEGURANÇA</button>
                <button id="btnCarregar">📂 CARREGAR DADOS DE HOJE</button>
                <button id="btnLimpar">🗑️ LIMPAR</button>
            </div>
            
            <div id="mensagem" style="margin-top: 1rem; display: none;"></div>
        </div>
    </div>

    <div class="footer">
        <p>PudimFlow - Sistema de Gestão de Produção | Turno da Noite</p>
    </div>

    <div class="dark-mode-toggle" onclick="toggleDarkMode()">
        <span class="light-icon">🌙</span>
        <span class="dark-icon">☀️</span>
    </div>

    <script>
        // Elementos
        const dssRealizado = document.getElementById('dssRealizado');
        const dssTema = document.getElementById('dssTema');
        const dssParticipantes = document.getElementById('dssParticipantes');
        const dssPontos = document.getElementById('dssPontos');
        const quaseAcidente = document.getElementById('quaseAcidente');
        const acaoPreventiva = document.getElementById('acaoPreventiva');
        const inspecoes = document.getElementById('inspecoes');
        const recomendacoes = document.getElementById('recomendacoes');

        // Salvar segurança
        document.getElementById('btnSalvar').addEventListener('click', async () => {
            // Combinar quase acidente com ação preventiva
            let quaseAcidenteCompleto = '';
            if (quaseAcidente.value) {
                quaseAcidenteCompleto = quaseAcidente.value;
                if (acaoPreventiva.value) {
                    quaseAcidenteCompleto += `\n\nAção preventiva: ${acaoPreventiva.value}`;
                }
            }
            
            const dados = {
                dssRealizado: dssRealizado.checked,
                dssTema: dssTema.value || '',
                quaseAcidente: quaseAcidenteCompleto || ''
            };
            
            const btn = document.getElementById('btnSalvar');
            const msgDiv = document.getElementById('mensagem');
            
            btn.disabled = true;
            btn.innerHTML = '💾 SALVANDO...';
            msgDiv.style.display = 'block';
            msgDiv.className = 'alert alert-info';
            msgDiv.innerHTML = 'Salvando dados de segurança...';
            
            try {
                // Buscar produção de hoje
                const responseGet = await fetch('/api/producao/hoje');
                const resultGet = await responseGet.json();
                
                let producaoExistente = {};
                if (resultGet.success && resultGet.data && resultGet.data.id) {
                    producaoExistente = resultGet.data;
                }
                
                // Dados completos para salvar (mantendo os dados anteriores)
                const dadosCompletos = {
                    brascopEstantes: producaoExistente.brascopEstantes || 0,
                    brascopKg: producaoExistente.brascopKg || 0,
                    brascopParadas: producaoExistente.brascopParadas || '',
                    brascopPerdas: producaoExistente.brascopPerdas || 0,
                    seracEstantes: producaoExistente.seracEstantes || 0,
                    seracKg: producaoExistente.seracKg || 0,
                    seracParadas: producaoExistente.seracParadas || '',
                    seracPerdas: producaoExistente.seracPerdas || 0,
                    bpfOk: producaoExistente.bpfOk || false,
                    bpfObservacao: producaoExistente.bpfObservacao || '',
                    falhas: producaoExistente.falhas || '',
                    reclamacoes: producaoExistente.reclamacoes || '',
                    ...dados
                };
                
                const response = await fetch('/api/producao', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dadosCompletos)
                });
                const result = await response.json();
                
                if (result.success) {
                    msgDiv.className = 'alert alert-success';
                    msgDiv.innerHTML = '✅ Dados de segurança salvos com sucesso!';
                    setTimeout(() => { msgDiv.style.display = 'none'; }, 3000);
                } else {
                    throw new Error(result.error);
                }
            } catch (error) {
                msgDiv.className = 'alert alert-danger';
                msgDiv.innerHTML = '❌ Erro ao salvar: ' + error.message;
            } finally {
                btn.disabled = false;
                btn.innerHTML = '💾 SALVAR SEGURANÇA';
            }
        });
        
        // Carregar dados de hoje
        document.getElementById('btnCarregar').addEventListener('click', async () => {
            try {
                const response = await fetch('/api/producao/hoje');
                const result = await response.json();
                
                if (result.success && result.data && result.data.id) {
                    const data = result.data;
                    
                    dssRealizado.checked = data.dssRealizado || false;
                    dssTema.value = data.dssTema || '';
                    
                    // Separar quase acidente da ação preventiva (se houver)
                    let quaseAcidenteText = data.quaseAcidente || '';
                    if (quaseAcidenteText.includes('Ação preventiva:')) {
                        const partes = quaseAcidenteText.split('\n\nAção preventiva:');
                        quaseAcidente.value = partes[0];
                        acaoPreventiva.value = partes[1] || '';
                    } else {
                        quaseAcidente.value = quaseAcidenteText;
                        acaoPreventiva.value = '';
                    }
                    
                    const msgDiv = document.getElementById('mensagem');
                    msgDiv.style.display = 'block';
                    msgDiv.className = 'alert alert-success';
                    msgDiv.innerHTML = '✅ Dados carregados com sucesso!';
                    setTimeout(() => { msgDiv.style.display = 'none'; }, 3000);
                } else {
                    // Reset para valores padrão
                    dssRealizado.checked = false;
                    dssTema.value = '';
                    quaseAcidente.value = '';
                    acaoPreventiva.value = '';
                    inspecoes.value = '';
                    recomendacoes.value = '';
                }
            } catch (error) {
                console.error('Erro ao carregar:', error);
            }
        });
        
        // Limpar formulário
        document.getElementById('btnLimpar').addEventListener('click', () => {
            dssRealizado.checked = false;
            dssTema.value = '';
            dssParticipantes.value = '';
            dssPontos.value = '';
            quaseAcidente.value = '';
            acaoPreventiva.value = '';
            inspecoes.value = '';
            recomendacoes.value = '';
        });
        
        // Dark mode toggle
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
        }
        
        // Carregar dados ao iniciar
        document.getElementById('btnCarregar').click();
    </script>
</body>
</html>
